<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a0f1e',
                        secondary: '#fbbf24',
                        accent: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body>
    <section class="relative px-4 py-8 lg:pt-12 lg:pb-16 overflow-hidden bg-[#000a14] min-h-screen flex items-center">
        <!-- Deep Navy & Neon Background Elements -->
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[1200px] h-[300px] bg-[#00f5ff]/10 blur-[150px] pointer-events-none"></div>
        
        <div class="relative mx-auto max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
            <div class="space-y-6 text-center lg:text-left z-10 pt-2">
                <div class="inline-block px-4 py-1 rounded-full border border-secondary/30 bg-secondary/10 text-secondary text-xs font-bold tracking-widest uppercase mb-2 shadow-neon">
                    Welcome to the VIP Club
                </div>
                <h1 class="text-[3rem] md:text-6xl lg:text-[4.5rem] font-black tracking-tighter leading-[1.1] text-[#fff200]" style="-webkit-text-stroke: 2px #d61858; text-shadow: 2px 4px 8px rgba(0,0,0,0.6), 0px 5px 0px #a30e40;">
                    Teen Patti <br/> Stars
                </h1>
                <p class="text-base md:text-lg leading-relaxed text-slate-300 max-w-xl mx-auto lg:mx-0 font-medium">
                    Experience the ultimate thrill. Play real cash <strong class="text-white">Teen Patti</strong> and <strong class="text-white">Rummy</strong> with VIP tables, instant withdrawals, and elite 24/7 support.
                </p>
                <div class="flex justify-center lg:justify-start pt-2 gap-4 flex-col sm:flex-row">
                    <a href="#" class="group relative px-6 py-3 bg-secondary text-primary font-black text-base tracking-widest uppercase rounded-lg overflow-hidden shadow-neon transform hover:-translate-y-1 transition-all">
                        <span class="relative flex items-center justify-center gap-2">
                            <i class="fa-solid fa-download"></i> DOWNLOAD APP
                        </span>
                    </a>
                </div>
            </div>
            
            <div class="relative z-10 flex justify-center lg:self-center">
                <!-- Casino Glowing Orb behind image -->
                <div class="absolute inset-0 bg-[#00f5ff]/20 rounded-full blur-[80px] animate-pulse"></div>
                <!-- Placeholder for image -->
                <div class="w-full max-w-md lg:max-w-[90%] h-64 bg-slate-800/50 rounded-2xl relative z-10 drop-shadow-[0_0_30px_rgba(0,245,255,0.2)] animate-[float_6s_ease-in-out_infinite] flex items-center justify-center text-slate-500 font-bold">
                    [Hero Image Placeholder]
                </div>
            </div>
        </div>
        
        <style>
            html { scroll-behavior: smooth; }
            @keyframes float {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-15px); }
                100% { transform: translateY(0px); }
            }
        </style>
    </section>
</body>
</html>
